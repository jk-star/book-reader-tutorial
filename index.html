    <link rel="icon" type="image/x-icon" href="assets/images/book-solid.svg">

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">

<body>

    <!-- Header -->
    <header class="header">

        <!-- Logo -->
        <div class="logo">

            <div class="logo-icon">
                <i class="fa-solid fa-book-open"></i>
            </div>

            <div class="logo-text">
                <h2>Book Reader</h2>
                <span>Learn • Read • Listen</span>
            </div>

        </div>

        <!-- Search -->

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input id="searchInput" type="text" placeholder="Search books, authors, categories...">

        </div>

        <div class="library-toolbar">

            <div id="categoryContainer" class="category-container"></div>

            <select id="sortBooks" class="sort-select">

                <option value="default">Default</option>

                <option value="az">Title (A-Z)</option>

                <option value="za">Title (Z-A)</option>

                <option value="author">Author</option>

                <option value="rating">Highest Rating</option>

                <option value="chapters">Most Chapters</option>

            </select>

        </div>

        <label class="favorite-filter">

            <input type="checkbox" id="favoriteOnly">

            Favorites Only

        </label>

    <!-- Main Layout -->
    <main class="main-layout">
        <div class="library-page">

            <header class="library-header">

                <p>Choose a book to start reading.</p>

            </header>

            <section id="continueReading" class="continue-reading">

            </section>

            <div id="bookGrid" class="book-grid">

            </div>

        </div>
    </main>
