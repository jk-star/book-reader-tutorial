<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Reader Tutorial</title>

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header -->
    <header class="header">

        <!-- Logo -->
        <div class="logo">

            <div class="logo-icon">
                <i class="fa-solid fa-book-open"></i>
            </div>

            <div class="logo-text">
                <h2>Book Reader</h2>
                <span>Learn • Read • Listen</span>
            </div>

        </div>

        <!-- Search -->

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input type="text" placeholder="Search chapter or topic...">

        </div>

        <!-- Right Side -->

        <div class="header-actions">

            <button class="font-btn">
                Aa
            </button>

            <button class="theme-btn">
                <i class="fa-regular fa-sun"></i>
            </button>

            <button class="bookmark-btn">
                <i class="fa-regular fa-bookmark"></i>
            </button>

            <div class="progress">

                <span>35%</span>

                <div class="progress-bar">

                    <div class="progress-fill"></div>

                </div>

            </div>

        </div>

    </header>

    <!-- Main Layout -->
    <main class="layout">

        <!-- Sidebar -->
        <aside class="sidebar">

        </aside>

        <!-- Book Content -->
        <section class="book-content">

        </section>

    </main>

    <!-- Audio Player -->
    <footer class="audio-player">

    </footer>

    <script src="js/app.js"></script>

</body>

</html>
